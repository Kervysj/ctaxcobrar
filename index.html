<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdriSweets Business Pro V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #111827; --cyan: #22d3ee; --rose: #f43f5e; --amber: #fbbf24; --green: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 90px; }
        
        .floating-tasa-alert {
            background: rgba(244, 63, 94, 0.2); border-bottom: 1px solid var(--rose); color: var(--rose);
            text-align: center; padding: 10px; font-size: 0.75rem; font-weight: bold; position: sticky; top: 0; z-index: 1001; backdrop-filter: blur(8px);
        }

        .header { padding: 20px; background: #0f172a; border-bottom: 1px solid #1f2937; text-align: center; }
        .tasa-pill { border: 1px solid var(--cyan); color: var(--cyan); padding: 5px 15px; border-radius: 50px; font-family: 'Orbitron'; font-size: 0.75rem; display: inline-block; margin-bottom: 15px; }
        .main-balance { font-family: 'Orbitron'; font-size: 2.3rem; margin: 5px 0; }

        .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; margin-top: -15px; }
        .kpi-card { background: var(--card); padding: 12px; border-radius: 15px; border: 1px solid #334155; text-align: center; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .btn-touch { background: var(--card); padding: 25px 15px; border-radius: 20px; border: 1px solid #1f2937; text-align: center; transition: 0.2s; }
        .btn-touch:active { transform: scale(0.95); background: #1e293b; }

        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        
        .section-title { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--cyan); margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; }

        .list-item { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid transparent; display: flex; align-items: center; justify-content: space-between; }
        .status-icon { font-size: 1.2rem; margin-right: 12px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f2937; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #64748b; font-weight: bold; font-size: 0.7rem; }
        .nav-btn.active { color: var(--cyan); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="sticky-tasa" class="floating-tasa-alert">⚠️ TASA ACTUAL: <span id="val-tasa-alert">0.00</span> Bs/$</div>

<div class="header">
    <div class="tasa-pill" onclick="setTasa()">BCV: <span id="tasa-val">0.00</span> ⚙️</div>
    <div class="main-balance" id="bs-total">0.00 Bs</div>
    <div id="usd-total" style="color:var(--cyan); opacity:0.8">≈ 0.00 $</div>
</div>

<div class="kpi-row">
    <div class="kpi-card" style="border-bottom: 3px solid var(--rose)"><small>DEBO</small><br><b id="kpi-debo" style="color:var(--rose)">0 Bs</b></div>
    <div class="kpi-card" style="border-bottom: 3px solid var(--amber)"><small>EN CALLE</small><br><b id="kpi-calle" style="color:var(--amber)">0 Bs</b></div>
</div>

<div id="v-dash" class="view active">
    <div class="action-grid">
        <div class="btn-touch" style="border-bottom: 4px solid var(--green)" onclick="registrarRapido('Venta')">💰<br>Venta</div>
        <div class="btn-touch" style="border-bottom: 4px solid var(--rose)" onclick="registrarRapido('Deuda')">📦<br>Nueva Deuda</div>
        <div class="btn-touch" style="border-bottom: 4px solid var(--amber)" onclick="registrarRapido('Fiado')">👤<br>Fiar Dulce</div>
        <div class="btn-touch" style="border-bottom: 4px solid var(--cyan)" onclick="nav('v-abonos')">💸<br>Pagar/Cobrar</div>
    </div>

    <div class="section-title">Deudas Pendientes (Urgente)</div>
    <div id="lista-pendientes-dash"></div>
</div>

<div id="v-hist" class="view">
    <div class="section-title">Historial General</div>
    <div id="lista-historial"></div>
</div>

<div id="v-abonos" class="view">
    <div class="section-title">Selecciona para abonar</div>
    <div id="lista-para-abonar"></div>
    <button onclick="nav('v-dash')" style="width:100%; padding:15px; color:#64748b; background:none; border:none; font-weight:bold;">Volver al Inicio</button>
</div>

<nav class="nav">
    <button class="nav-btn active" id="btn-nav-inicio" onclick="nav('v-dash', this)">INICIO</button>
    <button class="nav-btn" onclick="nav('v-hist', this)">HISTORIAL</button>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx79T15qYpqB09Vf22uGiABkH3CLeKaBIi7yiYY2s60Kufk-Wqu4eB6WY2sLzNEAql_/exec";
    let db = {};

    async function init() {
        try {
            const r = await fetch(SCRIPT_URL);
            db = await r.json();
            document.getElementById('val-tasa-alert').innerText = db.tasa;
            render();
            setTimeout(() => {
                if(!confirm(`Tasa actual: ${db.tasa} Bs/$\n¿Es correcta para hoy?`)) setTasa();
            }, 600);
        } catch (e) {
            alert("Error cargando datos. Revisa la conexión.");
        }
    }

    function render() {
        document.getElementById('tasa-val').innerText = db.tasa;
        let saldoBancario = parseFloat(db.saldoInicial);
        let debo = 0, calle = 0;
        let histHtml = "", pendHtml = "";

        // 1. Procesar Historial (y calcular saldo real)
        db.movimientos.slice(1).reverse().forEach(m => {
            let mnt = parseFloat(m[3]) || 0;
            let tipo = m[1];
            if(tipo === "Venta" || tipo === "Abono_Cobrado") saldoBancario += mnt;
            if(tipo === "Abono_Pagado" || tipo === "Gasto") saldoBancario -= mnt;

            let esPago = tipo.includes("Abono");
            histHtml += `
            <div class="list-item" style="border-left-color: ${esPago ? 'var(--green)' : 'var(--cyan)'}">
                <div style="display:flex; align-items:center;">
                    <span class="status-icon">${esPago ? '✅' : '⏳'}</span>
                    <div>
                        <b style="text-transform: capitalize;">${m[2]}</b>
                        <div style="font-size:0.7rem; color:#64748b;">${tipo} | ${m[5] || ''}</div>
                    </div>
                </div>
                <div style="text-align:right">
                    <b>${mnt.toLocaleString()} Bs</b>
                    <div style="font-size:0.6rem; color:#475569">${new Date(m[0]).toLocaleDateString()}</div>
                </div>
            </div>`;
        });

        // 2. Procesar Deudas Activas
        db.entidades.slice(1).forEach(e => {
            let sBs = parseFloat(e[2]);
            if(sBs > 0.1) { // Ignorar saldos basura
                if(e[1] === "Proveedor") debo += sBs; else calle += sBs;

                let reg = db.movimientos.find(m => m[2] === e[0] && (m[1] === 'Deuda' || m[1] === 'Fiado'));
                let tO = reg ? parseFloat(reg[4]) : db.tasa;
                let mUSD = (sBs / tO).toFixed(2);

                pendHtml += `
                <div class="list-item" style="border-left-color:var(--amber)" onclick="ejecutarAbono('${e[0]}', ${sBs}, '${e[1]}')">
                    <div style="flex:1">
                        <b>${e[0]}</b><br>
                        <small style="color:#64748b">🗓️ ${reg ? new Date(reg[0]).toLocaleDateString() : 'S/F'}</small>
                    </div>
                    <div style="text-align:right">
                        <b>${sBs.toLocaleString()} Bs</b><br>
                        <small style="color:var(--amber); font-family:'Orbitron'">$ ${mUSD}</small>
                    </div>
                </div>`;
            }
        });

        document.getElementById('bs-total').innerText = saldoBancario.toLocaleString() + " Bs";
        document.getElementById('usd-total').innerText = "≈ " + (saldoBancario / db.tasa).toFixed(2) + " $";
        document.getElementById('kpi-debo').innerText = debo.toLocaleString() + " Bs";
        document.getElementById('kpi-calle').innerText = calle.toLocaleString() + " Bs";
        
        document.getElementById('lista-historial').innerHTML = histHtml || "Sin movimientos registrados";
        document.getElementById('lista-pendientes-dash').innerHTML = pendHtml || "<div style='padding:20px; color:#64748b; text-align:center;'>✅ No hay deudas pendientes</div>";
        document.getElementById('lista-para-abonar').innerHTML = pendHtml || "<div style='padding:20px; color:#64748b; text-align:center;'>No hay cuentas para cobrar</div>";
    }

    function ejecutarAbono(nombre, saldoBs, tipoEnt) {
        let reg = db.movimientos.find(m => m[2] === nombre && (m[1] === 'Deuda' || m[1] === 'Fiado'));
        let tO = reg ? parseFloat(reg[4]) : db.tasa;
        let dUSD = (saldoBs / tO).toFixed(2);
        let sugerido = (dUSD * db.tasa).toFixed(2);

        let mnt = prompt(`COBRAR A: ${nombre}\nValor en $: ${dUSD}\nSugerido hoy: ${sugerido} Bs\n\n¿Cuánto recibes en Bs?`, sugerido);
        if(!mnt) return;

        // Si paga el monto sugerido o más, mandamos señal para limpiar saldo en Excel
        let limpiar = (parseFloat(mnt) >= (parseFloat(sugerido) - 0.5));

        enviarData({ 
            accion: "REGISTRAR", 
            tipo: tipoEnt === "Proveedor" ? "Abono_Pagado" : "Abono_Cobrado", 
            persona: nombre, 
            monto: parseFloat(mnt), 
            tasa: db.tasa, 
            ref: `Liquidación deuda de $${dUSD}`,
            limpiar: limpiar 
        });
    }

    function registrarRapido(tipo) {
        let p = prompt("Nombre:"); if(!p) return;
        let m = prompt("Monto en Bolívares:"); if(!m) return;
        let r = prompt("Referencia (Ej: Torta):");
        enviarData({ accion: "REGISTRAR", tipo, persona: p, monto: parseFloat(m), tasa: db.tasa, ref: r });
    }

    async function enviarData(p) {
        document.body.style.opacity = "0.5";
        await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify(p)});
        location.reload();
    }

    async function setTasa() {
        let n = prompt("Nueva Tasa BCV:", db.tasa);
        if(n) {
            await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({accion:"CAMBIAR_TASA", valor: parseFloat(n)})});
            location.reload();
        }
    }

    function nav(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    }
    window.onload = init;
</script>
</body>
</html>
