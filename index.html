<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdriSweets Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #111827; --cyan: #06b6d4; --amber: #f59e0b; --rose: #f43f5e; --text: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        /* Cabecera Dinámica */
        .header { padding: 25px; text-align: center; background: #0f172a; border-bottom: 1px solid #1f2937; position: relative; }
        .btn-tasa { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--cyan); color: var(--cyan); border-radius: 8px; padding: 5px; font-size: 0.7rem; }
        
        .main-val { font-family: 'Orbitron'; font-size: 2.2rem; color: #fff; margin: 10px 0; }
        .sub-val { color: #94a3b8; font-size: 1.1rem; }

        /* Botones de Acción Rápida (UX Mejorada) */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .action-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #1f2937; transition: 0.2s; }
        .action-card:active { transform: scale(0.95); background: #1e293b; }
        .action-card i { display: block; font-size: 1.5rem; margin-bottom: 8px; }

        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }

        /* Estilos de Formulario */
        .modal-body { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--cyan); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1f2937; border: 1px solid #374151; color: #fff; border-radius: 12px; box-sizing: border-box; }
        .btn-confirm { width: 100%; padding: 18px; background: var(--cyan); color: #000; border: none; border-radius: 12px; font-weight: 800; margin-top: 10px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f2937; }
        .nav-btn { background: none; border: none; color: #64748b; font-size: 0.7rem; font-weight: bold; }
        .nav-btn.active { color: var(--cyan); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <button class="btn-tasa" onclick="updateTasaManual()">⚙️ TASA BCV</button>
        <div id="tasa-display" style="color:var(--cyan); font-family: 'Orbitron'; font-size: 0.8rem;">BCV: 0.00</div>
        <div class="main-val" id="bal-bs">0.00 Bs</div>
        <div class="sub-val" id="bal-usd">0.00 $</div>
    </div>

    <div id="v-dash" class="view active">
        <div class="action-grid">
            <div class="action-card" onclick="openReg('Ingreso', 'VENTA DE DULCES')">💰 <br> Venta</div>
            <div class="action-card" onclick="openReg('Abono_Prov', 'PAGO A PROVEEDOR')">🚚 <br> Pagar Prov</div>
            <div class="action-card" onclick="openReg('Cobro_Cli', 'COBRO A CLIENTE')">🤝 <br> Cobrar Fiado</div>
            <div class="action-card" onclick="openReg('Fiado_Cli', 'ENTREGA FIADO')">📝 <br> Dar Fiado</div>
        </div>
        <h4 style="margin-top:30px; color:#64748b;">Estado Actual</h4>
        <div id="resumen-mini"></div>
    </div>

    <div id="v-reg" class="view">
        <div class="modal-body">
            <h3 id="reg-title" style="color:var(--cyan); margin-top:0;">Registro</h3>
            <input type="text" id="f-benef" placeholder="¿A quién? (Nombre)">
            <input type="number" id="f-monto" placeholder="Monto en Bolívares">
            <input type="text" id="f-ref" placeholder="Ref / Pago Móvil">
            <button class="btn-confirm" onclick="enviar()">CONFIRMAR Y GUARDAR</button>
            <button onclick="nav('v-dash', null)" style="background:none; border:none; color:#64748b; width:100%; margin-top:15px;">Cancelar</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="nav('v-dash', this)">INICIO</button>
        <button class="nav-btn" onclick="nav('v-prov', this)">PROVEEDORES</button>
        <button class="nav-btn" onclick="nav('v-cli', this)">CLIENTES</button>
    </nav>

    <script>
        const API = "TU_URL_AQUÍ"; // REEMPLAZA CON TU URL
        let tasa = 1, tipoActual = '', conceptoActual = '';

        async function init() {
            const r = await fetch(API);
            const d = await r.json();
            tasa = d.tasa;
            document.getElementById('tasa-display').innerText = `BCV: ${tasa.toFixed(2)}`;
            render(d);
        }

        function render(data) {
            let disp = 0;
            data.movimientos.slice(1).forEach(m => {
                let mnt = parseFloat(m[3]) || 0;
                if(m[1] === "Ingreso" || m[1] === "Cobro_Cli") disp += mnt;
                else disp -= mnt;
            });
            document.getElementById('bal-bs').innerText = disp.toLocaleString() + " Bs";
            document.getElementById('bal-usd').innerText = "≈ " + (disp / tasa).toFixed(2) + " $";
        }

        function openReg(tipo, concepto) {
            tipoActual = tipo; conceptoActual = concepto;
            document.getElementById('reg-title').innerText = concepto;
            nav('v-reg', null);
        }

        function nav(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        }

        async function updateTasaManual() {
            let n = prompt("Ingrese nueva Tasa BCV:", tasa);
            if(n) {
                await fetch(API, {method:'POST', mode:'no-cors', body: JSON.stringify({accion:"UPDATE_TASA", nuevaTasa: parseFloat(n)})});
                alert("Tasa Actualizada!");
                location.reload();
            }
        }

        async function enviar() {
            const payload = {
                tipo: tipoActual,
                beneficiario: document.getElementById('f-benef').value,
                montoBs: parseFloat(document.getElementById('f-monto').value),
                tasa: tasa,
                referencia: document.getElementById('f-ref').value,
                concepto: conceptoActual
            };
            await fetch(API, {method:'POST', mode:'no-cors', body: JSON.stringify(payload)});
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
