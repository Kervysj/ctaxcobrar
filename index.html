<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdriSweets Pro - Richard Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --card: #111827; --cyan: #22d3ee; --rose: #f43f5e; --amber: #fbbf24; --green: #10b981; --gray: #475569; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 90px; transition: opacity 0.3s; }
        .header { padding: 20px; background: #0f172a; border-bottom: 1px solid #1f2937; text-align: center; position: sticky; top: 0; z-index: 100; }
        .tasa-container { display: inline-flex; align-items: center; gap: 10px; background: rgba(31,41,55,0.5); padding: 6px 15px; border-radius: 50px; border: 1px solid #374151; font-family: 'Orbitron'; font-size: 0.75rem; margin-bottom: 8px; }
        .main-balance { font-family: 'Orbitron'; font-size: 2rem; margin: 5px 0; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .btn-touch { background: var(--card); padding: 15px 5px; border-radius: 15px; border: 1px solid #1f2937; text-align: center; border-bottom: 4px solid transparent; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .btn-touch:active { transform: scale(0.98); opacity: 0.8; }
        .section-title { font-family: 'Orbitron'; font-size: 0.75rem; color: var(--cyan); padding: 15px 20px 5px 20px; text-transform: uppercase; }
        .list-item { background: var(--card); padding: 15px; border-radius: 15px; margin: 0 15px 10px 15px; border-left: 5px solid transparent; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1f2937; z-index: 100; }
        .nav-btn { background: none; border: none; color: var(--gray); font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; }
        .nav-btn.active { color: var(--cyan); }
    </style>
</head>
<body>

<div class="header">
    <div class="tasa-container">BCV: <span id="tasa-val">0.00</span></div>
    <div id="bs-total" class="main-balance">0.00 Bs</div>
    <div id="usd-total" style="color:var(--cyan); font-size: 0.9rem;">≈ 0.00 $</div>
</div>

<div id="v-dash" class="view active">
    <div class="action-grid">
        <div class="btn-touch" style="border-bottom-color:var(--green)" onclick="registrarNuevo('Venta')">💰<br>Venta</div>
        <div class="btn-touch" style="border-bottom-color:var(--rose)" onclick="registrarNuevo('Gasto')">📤<br><span style="color:var(--rose)">Gasto</span></div>
        <div class="btn-touch" style="border-bottom-color:var(--rose)" onclick="registrarNuevo('Deuda')">📦<br>Nueva Deuda</div>
        <div class="btn-touch" style="border-bottom-color:var(--amber)" onclick="registrarNuevo('Fiado')">👤<br>Fiar Dulce</div>
    </div>
    
    <div class="section-title">Cuentas Pendientes (Ajuste x Tasa)</div>
    <div id="lista-pendientes-inicio"></div>
</div>

<div id="v-hist" class="view">
    <div class="section-title" style="margin-top:15px">Historial Completo</div>
    <div id="lista-historial"></div>
</div>

<nav class="nav">
    <button class="nav-btn active" onclick="nav('v-dash', this)">INICIO</button>
    <button class="nav-btn" onclick="nav('v-hist', this)">HISTORIAL</button>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx79T15qYpqB09Vf22uGiABkH3CLeKaBIi7yiYY2s60Kufk-Wqu4eB6WY2sLzNEAql_/exec";
    let db = {};

    async function init() {
        try {
            const r = await fetch(SCRIPT_URL);
            db = await r.json();
            
            let confirmarTasaInicial = confirm(`¡Hola Richard!\nTasa actual: ${db.tasa} Bs\n\n¿La mantenemos?`);
            if(!confirmarTasaInicial) {
                let nuevaTasa = prompt("Nueva tasa del día:", db.tasa);
                if(nuevaTasa) db.tasa = parseFloat(nuevaTasa);
            }

            document.getElementById('tasa-val').innerText = db.tasa;
            render();
        } catch(e) { alert("Error de conexión."); }
    }

    function render() {
        let saldoBancario = parseFloat(db.saldoInicial) || 0;
        let pendHtml = "", histHtml = "";

        // PROCESAR MOVIMIENTOS
        db.movimientos.slice(1).reverse().forEach(m => {
            let mBs = parseFloat(m[3]) || 0;
            let mTasa = parseFloat(m[4]) || db.tasa;
            let tipo = m[1];

            if(["Venta", "Abono_Cobrado"].includes(tipo)) saldoBancario += mBs;
            if(["Gasto", "Abono_Pagado"].includes(tipo)) saldoBancario -= mBs;

            let color = ["Deuda", "Gasto", "Abono_Pagado"].includes(tipo) ? 'var(--rose)' : 'var(--green)';
            if(tipo === "Fiado") color = 'var(--amber)';

            histHtml += `
            <div class="list-item" style="border-left-color:${color}">
                <div style="flex:1;">
                    <b style="color:${color}">${m[2]}</b> <small>(${tipo})</small><br>
                    <small style="color:var(--gray)">${m[0]} | Tasa: ${mTasa}</small>
                </div>
                <div style="text-align:right">
                    <b>${mBs.toFixed(2)} Bs</b><br>
                    <small style="color:var(--cyan)">$${(mBs/mTasa).toFixed(2)}</small>
                </div>
            </div>`;
        });

        // PROCESAR DEUDAS CON LOGICA DE INDEXACIÓN
        db.entidades.slice(1).forEach(e => {
            let nombre = e[0];
            let saldoDolar = 0;
            let infoOriginal = ""; // Para guardar el detalle visual de "antes"

            db.movimientos.slice(1).forEach(m => {
                if(m[2] === nombre) {
                    let mBs = parseFloat(m[3]);
                    let mTasa = parseFloat(m[4]) || db.tasa;
                    let mD = mBs / mTasa;
                    if(["Fiado", "Abono_Pagado", "Venta"].includes(m[1])) saldoDolar += mD;
                    else saldoDolar -= mD;
                    
                    // Guardamos una referencia del primer movimiento para el "Visual"
                    if(!infoOriginal && m[1] !== "Abono_Cobrado" && m[1] !== "Abono_Pagado") {
                        infoOriginal = `Deuda Orig: ${mBs.toFixed(2)} Bs (Tasa: ${mTasa})`;
                    }
                }
            });

            let absDolar = Math.abs(saldoDolar);
            if(absDolar > 0.01 && !["ENTRADA", "GASTO"].includes(nombre.toUpperCase())) {
                let montoHoy = absDolar * db.tasa;
                let esYoDebo = e[1] === "Proveedor";
                
                pendHtml += `
                <div class="list-item" style="border-left-color:${esYoDebo?'var(--rose)':'var(--amber)'}" 
                     onclick="opcionesPersona('${nombre}', ${absDolar}, ${montoHoy}, '${infoOriginal}', '${e[1]}')">
                    <div><b>${nombre}</b><br><small style="color:var(--gray)">${infoOriginal}</small></div>
                    <div style="text-align:right">
                        <b style="color:${esYoDebo?'var(--rose)':'var(--amber)'}">${montoHoy.toFixed(2)} Bs</b><br>
                        <small style="color:var(--cyan)">Valor: $${absDolar.toFixed(2)}</small>
                    </div>
                </div>`;
            }
        });

        document.getElementById('bs-total').innerText = saldoBancario.toFixed(2) + " Bs";
        document.getElementById('usd-total').innerText = "≈ " + (saldoBancario / db.tasa).toFixed(2) + " $";
        document.getElementById('lista-pendientes-inicio').innerHTML = pendHtml || "<p style='padding:20px; color:var(--gray)'>Todo al día.</p>";
        document.getElementById('lista-historial').innerHTML = histHtml;
    }

    function opcionesPersona(nom, dolares, bsHoy, infoOrig, tipoEnt) {
        let esProv = tipoEnt === "Proveedor";
        let mensajeVisual = `--- REPORTE DE VALOR ---\n` +
                            `Persona: ${nom}\n` +
                            `${infoOrig}\n` +
                            `Valor en $: ${dolares.toFixed(2)}$\n\n` +
                            `A TASA ACTUAL (${db.tasa}):\n` +
                            `Monto a liquidar: ${bsHoy.toFixed(2)} Bs\n` +
                            `------------------------\n` +
                            `1. Registrar ABONO\n2. PAGAR TODO (${bsHoy.toFixed(2)} Bs)\n3. SUMAR MÁS\nElija (1,2,3):`;

        let opc = prompt(mensajeVisual, "2");
        if(opc === "1") {
            let m = prompt("Monto que entrega en Bs:");
            if(m) registrarNuevo(esProv ? "Abono_Pagado" : "Abono_Cobrado", nom, m);
        } else if(opc === "2") {
            registrarNuevo(esProv ? "Abono_Pagado" : "Abono_Cobrado", nom, bsHoy.toFixed(2));
        } else if(opc === "3") {
            let m = prompt("Monto nuevo a sumar (Bs):");
            if(m) registrarNuevo(esProv ? "Deuda" : "Fiado", nom, m);
        }
    }

    async function registrarNuevo(tipo, nom, mnt) {
        let persona = nom || prompt("Nombre:");
        if(!persona) return;
        let monto = mnt || prompt("Monto Bs:");
        if(!monto) return;

        document.body.style.opacity="0.5";
        try {
            await fetch(SCRIPT_URL, {
                method:'POST', mode:'no-cors', 
                body: JSON.stringify({ accion:"REGISTRAR", tipo, persona, monto:parseFloat(monto), tasa:db.tasa, descripcion: "App Touch", detalle: "" })
            });
            location.reload();
        } catch(e) { alert("Error"); document.body.style.opacity="1"; }
    }

    function nav(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    window.onload = init;
</script>
</body>
</html>
